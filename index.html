function toggleReflection(chapter, index) {
  const card = document.getElementById('refl-' + chapter + '-' + index);
  const toggle = card.querySelector('.reflection-toggle');
  card.classList.toggle('open');
  toggle.setAttribute('aria-expanded', card.classList.contains('open'));
}

function markDevotionalDone() {
  if (state.progress[state.currentChapter].devotional) return;
  state.progress[state.currentChapter].devotional = true;
  saveProgress();
  const btn = document.getElementById('devotionalDoneBtn');
  btn.classList.add('completed');
  btn.innerHTML = '&#10003; Devotional Complete';
  updateSessionProgress();
  checkChapterCompletion();
}

// ========== QUIZ ==========
function getQuizState(chapterNum) {
  if (!state.quizState[chapterNum]) {
    state.quizState[chapterNum] = {
      currentQ: 0,
      score: 0,
      answered: false,
      finished: false,
      answers: []
    };
  }
  return state.quizState[chapterNum];
}

// Shuffle utility
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuiz(ch) {
  const qs = getQuizState(ch.chapter);
  const tab = document.getElementById('quizTab');
  
  if (qs.finished) {
    renderQuizResults(ch);
    return;
  }
  
  const questions = ch.quiz.questions;
  const q = questions[qs.currentQ];
  const total = questions.length;
  
  let optionsHTML = '';
  
  if (q.type === 'true_false') {
    // Randomly swap True/False button order
    const tfFirst = Math.random() < 0.5;
    optionsHTML = `
      <div class="tf-buttons" id="tfButtons">
        <button class="tf-btn" onclick="answerTF(${tfFirst})" tabindex="0">${tfFirst ? 'True' : 'False'}</button>
        <button class="tf-btn" onclick="answerTF(${!tfFirst})" tabindex="0">${!tfFirst ? 'True' : 'False'}</button>
      </div>
    `;
  } else {
    // Shuffle multiple choice options each time quiz is rendered
    const indexed = q.options.map((opt, i) => ({ opt, origIdx: i }));
    const shuffled = shuffleArray(indexed);
    // Store the mapping so answerMC can map back to original index
    window._mcShuffleMap = shuffled.map(s => s.origIdx);
    
    optionsHTML = '<div class="quiz-options" id="quizOptions">';
    shuffled.forEach((s, i) => {
      // Re-label options A, B, C, D based on new position
      const label = String.fromCharCode(65 + i);
      const optText = s.opt.replace(/^[A-D]\)\s*/, label + ') ');
      optionsHTML += `
        <button class="quiz-option" onclick="answerMC(${i})" tabindex="0" data-index="${i}">
          <span class="quiz-radio"></span>
          <span>${optText}</span>
        </button>
      `;
    });
    optionsHTML += '</div>';
  }
  
  tab.innerHTML = `
    <div class="quiz-progress">
      <span class="quiz-progress-text">Question ${qs.currentQ + 1} of ${total}</span>
      <span class="quiz-score">Score: ${qs.score}/${total}</span>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" style="width: ${((qs.currentQ) / total) * 100}%"></div>
    </div>
    <div class="quiz-question">${q.question}</div>
    ${optionsHTML}
    <div id="quizFeedback"></div>
    <div id="quizNextContainer" style="display:none;">
      <button class="quiz-next-btn" onclick="nextQuizQuestion()" tabindex="0">
        ${qs.currentQ < total - 1 ? 'Next Question &#8594;' : 'See Results &#8594;'}
      </button>
    </div>
  `;
}

function answerMC(displayIndex) {
  const ch = getChapterData();
  const qs = getQuizState(ch.chapter);
  if (qs.answered) return;
  qs.answered = true;
  
  const q = ch.quiz.questions[qs.currentQ];
  // Map display index back to original data index
  const origIndex = window._mcShuffleMap[displayIndex];
  const correct = origIndex === q.correct;
  if (correct) qs.score++;
  qs.answers.push({ selected: origIndex, correct });
  saveProgress();
  
  // Find which display position has the correct answer
  const correctDisplayIdx = window._mcShuffleMap.indexOf(q.correct);
  
  // Update UI
  const options = document.querySelectorAll('#quizOptions .quiz-option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === displayIndex) {
      opt.classList.add(correct ? 'correct' : 'incorrect');
    }
    if (i === correctDisplayIdx && !correct) {
      opt.classList.add('correct');
    }
  });
  
  showQuizFeedback(correct, q.explanation);
}

function answerTF(selected) {
  const ch = getChapterData();
  const qs = getQuizState(ch.chapter);
  if (qs.answered) return;
  qs.answered = true;
  
  const q = ch.quiz.questions[qs.currentQ];
  const correct = selected === q.correct;
  if (correct) qs.score++;
  qs.answers.push({ selected, correct });
  saveProgress();
  
  const buttons = document.querySelectorAll('#tfButtons .tf-btn');
  buttons.forEach(btn => {
    btn.classList.add('disabled');
    const btnValue = btn.textContent.trim() === 'True';
    if (btnValue === selected) {
      btn.classList.add(correct ? 'correct' : 'incorrect');
    }
    if (btnValue === q.correct && !correct) {
      btn.classList.add('correct');
    }
  });
  
  showQuizFeedback(correct, q.explanation);
}

function showQuizFeedback(correct, explanation) {
  const fb = document.getElementById('quizFeedback');
  fb.innerHTML = `
    <div class="quiz-feedback ${correct ? 'correct' : 'incorrect'}">
      <strong>${correct ? '&#10003; Correct!' : 'Not quite'}</strong>
      ${explanation}
    </div>
  `;
  document.getElementById('quizNextContainer').style.display = 'block';
  document.querySelector('.quiz-next-btn').focus();
}

function nextQuizQuestion() {
  const ch = getChapterData();
  const qs = getQuizState(ch.chapter);
  qs.currentQ++;
  qs.answered = false;
  
  if (qs.currentQ >= ch.quiz.questions.length) {
    qs.finished = true;
    state.progress[ch.chapter].quiz = true;
    saveProgress();
    updateSessionProgress();
    renderQuizResults(ch);
    checkChapterCompletion();
  } else {
    renderQuiz(ch);
  }
}

function renderQuizResults(ch) {
  const qs = getQuizState(ch.chapter);
  const total = ch.quiz.questions.length;
  const score = qs.score;
  const tab = document.getElementById('quizTab');
  
  let message = '';
  let sub = '';
  if (score === total) {
    message = 'Perfect Score!';
    sub = 'You have a wonderful grasp of this chapter. Well done!';
  } else if (score >= total * 0.8) {
    message = 'Great Work!';
    sub = 'You really know this material well. Keep it up!';
  } else if (score >= total * 0.6) {
    message = 'Good Effort!';
    sub = 'You\'re learning so much. Consider revisiting the devotional for deeper insight.';
  } else {
    message = 'Keep Going!';
    sub = 'Every step in this journey matters. Revisit the chapter and try again anytime.';
  }
  
  tab.innerHTML = `
    <div class="quiz-results">
      <div class="quiz-results-score">${score}/${total}</div>
      <div class="quiz-results-label">questions correct</div>
      <div class="quiz-results-message">${message}</div>
      <p class="quiz-results-sub">${sub}</p>
      <button class="quiz-next-btn" onclick="retakeQuiz()" tabindex="0">Retake Quiz</button>
    </div>
  `;
}

function retakeQuiz() {
  const ch = getChapterData();
  state.quizState[ch.chapter] = null;
  renderQuiz(ch);
}

// ========== PUZZLE ==========
function getPuzzleState(chapterNum) {
  if (!state.puzzleState[chapterNum]) {
    state.puzzleState[chapterNum] = { solved: false };
  }
  return state.puzzleState[chapterNum];
}

function renderPuzzle(ch) {
  const ps = getPuzzleState(ch.chapter);
  const puzzle = ch.puzzle;
  
  if (ps.solved) {
    renderPuzzleSolved(ch);
    return;
  }
  
  switch (puzzle.type) {
    case 'fill_in_blank': renderFIB(ch); break;
    case 'match_symbol': renderMatch(ch); break;
    case 'order_events': renderOrder(ch); break;
  }
}

// ---- Fill in the Blank ----
function renderFIB(ch) {
  const puzzle = ch.puzzle;
  const tab = document.getElementById('puzzleTab');
  
  // Create blanks from template
  let blankIndex = 0;
  const templateHTML = puzzle.template.replace(/__+/g, () => {
    const idx = blankIndex++;
    return `<span class="fib-blank" id="fib-blank-${idx}" onclick="removeFIBWord(${idx})" tabindex="0" data-index="${idx}" role="button" aria-label="Blank ${idx + 1}, empty"></span>`;
  });
  
  // Shuffle words for word bank
  const shuffledWords = [...puzzle.words].sort(() => Math.random() - 0.5);
  
  const wordsHTML = shuffledWords.map((w, i) => `
    <button class="word-chip" id="word-chip-${i}" onclick="placeFIBWord(${i}, '${w.replace(/'/g, "\\'")}')" data-word="${w}" tabindex="0">${w}</button>
  `).join('');
  
  tab.innerHTML = `
    <div class="puzzle-instructions"><strong>Fill in the Blank:</strong> Tap a word from the bank below to fill the next empty blank. Tap a filled blank to remove the word.</div>
    <div class="fib-reference">${puzzle.verse_reference}</div>
    <div class="fib-template">${templateHTML}</div>
    <div class="word-bank">
      <div class="word-bank-title">Word Bank</div>
      ${wordsHTML}
    </div>
    <div class="puzzle-actions">
      <button class="puzzle-check-btn" onclick="checkFIB()" tabindex="0">Check Answers</button>
      <button class="puzzle-reset-btn" onclick="renderFIB(getChapterData())" tabindex="0">Reset</button>
    </div>
    <div id="puzzleFeedback"></div>
  `;
  
  // Store state for this puzzle
  window._fibState = {
    filled: new Array(puzzle.answers.length).fill(null),
    wordUsed: new Array(shuffledWords.length).fill(false),
    words: shuffledWords
  };
}

function placeFIBWord(chipIndex, word) {
  const fs = window._fibState;
  if (fs.wordUsed[chipIndex]) return;
  
  // Find first empty blank
  const emptyIdx = fs.filled.indexOf(null);
  if (emptyIdx === -1) return;
  
  fs.filled[emptyIdx] = { chipIndex, word };
  fs.wordUsed[chipIndex] = true;
  
  // Update UI
  const blank = document.getElementById('fib-blank-' + emptyIdx);
  blank.textContent = word;
  blank.classList.add('filled');
  blank.setAttribute('aria-label', 'Blank ' + (emptyIdx + 1) + ', filled with ' + word);
  
  const chip = document.getElementById('word-chip-' + chipIndex);
  chip.classList.add('used');
}

function removeFIBWord(blankIndex) {
  const fs = window._fibState;
  const entry = fs.filled[blankIndex];
  if (!entry) return;
  
  fs.wordUsed[entry.chipIndex] = false;
  fs.filled[blankIndex] = null;
  
  const blank = document.getElementById('fib-blank-' + blankIndex);
  blank.textContent = '';
  blank.classList.remove('filled', 'correct-blank', 'incorrect-blank');
  blank.setAttribute('aria-label', 'Blank ' + (blankIndex + 1) + ', empty');
  
  const chip = document.getElementById('word-chip-' + entry.chipIndex);
  chip.classList.remove('used');
}

function checkFIB() {
  const ch = getChapterData();
  const fs = window._fibState;
  const answers = ch.puzzle.answers;
  let allCorrect = true;
  
  answers.forEach((ans, i) => {
    const blank = document.getElementById('fib-blank-' + i);
    const entry = fs.filled[i];
    if (entry && entry.word === ans) {
      blank.classList.add('correct-blank');
      blank.classList.remove('incorrect-blank');
    } else {
      blank.classList.add('incorrect-blank');
      blank.classList.remove('correct-blank');
      allCorrect = false;
    }
  });
  
  const fb = document.getElementById('puzzleFeedback');
  if (allCorrect) {
    fb.innerHTML = '<div class="puzzle-feedback success">&#10003; Perfect! You filled in every word correctly.</div>';
    state.progress[ch.chapter].puzzle = true;
    state.puzzleState[ch.chapter].solved = true;
    saveProgress();
    updateSessionProgress();
    checkChapterCompletion();
  } else {
    fb.innerHTML = '<div class="puzzle-feedback error">Not quite right. Check the highlighted blanks and try again!</div>';
  }
}

// ---- Match Symbol ----
function renderMatch(ch) {
  const puzzle = ch.puzzle;
  const tab = document.getElementById('puzzleTab');
  
  // Shuffle descriptions
  const shuffledDescs = puzzle.pairs.map((p, i) => ({ ...p, origIndex: i }));
  const shuffledRight = [...shuffledDescs].sort(() => Math.random() - 0.5);
  
  let leftHTML = '';
  let rightHTML = '';
  
  puzzle.pairs.forEach((pair, i) => {
    leftHTML += `<button class="match-item" id="match-left-${i}" onclick="selectMatchItem('left', ${i})" data-side="left" data-index="${i}" tabindex="0">${pair.symbol}</button>`;
  });
  
  shuffledRight.forEach((pair, i) => {
    rightHTML += `<button class="match-item" id="match-right-${i}" onclick="selectMatchItem('right', ${i})" data-side="right" data-index="${i}" data-orig="${pair.origIndex}" tabindex="0">${pair.description}</button>`;
  });
  
  tab.innerHTML = `
    <div class="puzzle-instructions"><strong>Match the Symbols:</strong> Tap a symbol on the left, then tap its matching description on the right. Matched pairs will lock in place.</div>
    <div class="match-grid">
      <div class="match-column">
        <div class="match-column-title">Symbols</div>
        ${leftHTML}
      </div>
      <div class="match-column">
        <div class="match-column-title">Descriptions</div>
        ${rightHTML}
      </div>
    </div>
    <div id="puzzleFeedback"></div>
  `;
  
  window._matchState = {
    selected: null, // { side, index }
    matched: new Set(),
    matchedRight: new Set(),
    totalPairs: puzzle.pairs.length,
    shuffledRight: shuffledRight
  };
}

function selectMatchItem(side, index) {
  const ms = window._matchState;
  
  // Ignore if already matched
  if (side === 'left' && ms.matched.has(index)) return;
  if (side === 'right' && ms.matchedRight.has(index)) return;
  
  const el = document.getElementById('match-' + side + '-' + index);
  
  if (!ms.selected) {
    // First selection
    ms.selected = { side, index };
    el.classList.add('selected');
  } else if (ms.selected.side === side) {
    // Same side - switch selection
    document.getElementById('match-' + ms.selected.side + '-' + ms.selected.index).classList.remove('selected');
    ms.selected = { side, index };
    el.classList.add('selected');
  } else {
    // Different side - attempt match
    const prevEl = document.getElementById('match-' + ms.selected.side + '-' + ms.selected.index);
    
    let leftIdx, rightIdx;
    if (ms.selected.side === 'left') {
      leftIdx = ms.selected.index;
      rightIdx = index;
    } else {
      leftIdx = index;
      rightIdx = ms.selected.index;
    }
    
    const rightOrig = parseInt(document.getElementById('match-right-' + rightIdx).dataset.orig);
    
    if (leftIdx === rightOrig) {
      // Correct match
      prevEl.classList.remove('selected');
      prevEl.classList.add('matched');
      el.classList.add('matched');
      ms.matched.add(leftIdx);
      ms.matchedRight.add(rightIdx);
      ms.selected = null;
      
      // Check if all matched
      if (ms.matched.size === ms.totalPairs) {
        const ch = getChapterData();
        state.progress[ch.chapter].puzzle = true;
        state.puzzleState[ch.chapter].solved = true;
        saveProgress();
        updateSessionProgress();
        const fb = document.getElementById('puzzleFeedback');
        fb.innerHTML = '<div class="puzzle-feedback success">&#10003; All matched! Wonderful work!</div>';
        checkChapterCompletion();
      }
    } else {
      // Wrong match
      prevEl.classList.remove('selected');
      el.classList.add('wrong');
      prevEl.classList.add('wrong');
      ms.selected = null;
      setTimeout(() => {
        el.classList.remove('wrong');
        prevEl.classList.remove('wrong');
      }, 600);
    }
  }
}

// ---- Order Events ----
function renderOrder(ch) {
  const puzzle = ch.puzzle;
  const tab = document.getElementById('puzzleTab');
  
  // Use shuffled_order to create initial ordering
  const currentOrder = puzzle.shuffled_order.map(i => ({ text: puzzle.events[i], origIndex: i }));
  
  window._orderState = {
    items: currentOrder,
    correctOrder: puzzle.events,
    checked: false
  };
  
  renderOrderList(tab, ch);
}

function renderOrderList(tab, ch) {
  const os = window._orderState;
  
  let listHTML = os.items.map((item, i) => `
    <div class="order-item" id="order-item-${i}" data-index="${i}">
      <span class="order-number">${i + 1}</span>
      <span class="order-text">${item.text}</span>
      <div class="order-controls">
        <button class="order-btn" onclick="moveOrderItem(${i}, -1)" ${i === 0 ? 'disabled' : ''} aria-label="Move up" tabindex="0">&#9650;</button>
        <button class="order-btn" onclick="moveOrderItem(${i}, 1)" ${i === os.items.length - 1 ? 'disabled' : ''} aria-label="Move down" tabindex="0">&#9660;</button>
      </div>
    </div>
  `).join('');
  
  if (!tab) tab = document.getElementById('puzzleTab');
  
  tab.innerHTML = `
    <div class="puzzle-instructions"><strong>Order the Events:</strong> Arrange these events in the correct order as they appear in the chapter. Use the arrows to move items up or down.</div>
    <div class="order-list" id="orderList">${listHTML}</div>
    <div class="puzzle-actions">
      <button class="puzzle-check-btn" onclick="checkOrder()" tabindex="0">Check Order</button>
      <button class="puzzle-reset-btn" onclick="renderOrder(getChapterData())" tabindex="0">Reset</button>
    </div>
    <div id="puzzleFeedback"></div>
  `;
}

function moveOrderItem(index, direction) {
  const os = window._orderState;
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= os.items.length) return;
  
  // Swap
  [os.items[index], os.items[newIndex]] = [os.items[newIndex], os.items[index]];
  
  renderOrderList(null, getChapterData());
}

function checkOrder() {
  const ch = getChapterData();
  const os = window._orderState;
  let allCorrect = true;
  
  os.items.forEach((item, i) => {
    const el = document.getElementById('order-item-' + i);
    if (item.origIndex === i) {
      el.classList.add('correct-order');
      el.classList.remove('incorrect-order');
    } else {
      el.classList.add('incorrect-order');
      el.classList.remove('correct-order');
      allCorrect = false;
    }
  });
  
  const fb = document.getElementById('puzzleFeedback');
  if (allCorrect) {
    fb.innerHTML = '<div class="puzzle-feedback success">&#10003; Perfect order! You know this chapter well.</div>';
    state.progress[ch.chapter].puzzle = true;
    state.puzzleState[ch.chapter].solved = true;
    saveProgress();
    updateSessionProgress();
    checkChapterCompletion();
  } else {
    fb.innerHTML = '<div class="puzzle-feedback error">Some events are out of order. The green ones are correct — keep adjusting the rest!</div>';
  }
}

function renderPuzzleSolved(ch) {
  const tab = document.getElementById('puzzleTab');
  tab.innerHTML = `
    <div class="quiz-results">
      <div class="completion-icon" style="font-size:48px;">&#10003;</div>
      <div class="quiz-results-message">Puzzle Complete!</div>
      <p class="quiz-results-sub">You've solved this chapter's puzzle. Great work!</p>
      <button class="puzzle-reset-btn" onclick="resetPuzzle()" tabindex="0" style="margin:0 auto;">Try Again</button>
    </div>
  `;
}

function resetPuzzle() {
  const ch = getChapterData();
  state.puzzleState[ch.chapter] = { solved: false };
  renderPuzzle(ch);
}

// ========== CHAPTER COMPLETION ==========
function checkChapterCompletion() {
  const p = state.progress[state.currentChapter];
  if (p.devotional && p.quiz && p.puzzle) {
    // Show completion overlay after a brief delay
    setTimeout(() => {
      const ch = getChapterData();
      document.getElementById('completionTitle').textContent = 'Chapter ' + ch.chapter + ' Complete!';
      document.getElementById('completionSub').textContent = "You've finished all three modes for \"" + ch.title + '.\" Beautiful work!';
      document.getElementById('completionOverlay').classList.add('visible');
      document.querySelector('.completion-btn').focus();
    }, 500);
  }
}

function closeCompletion() {
  document.getElementById('completionOverlay').classList.remove('visible');
}

// ========== KEYBOARD SUPPORT ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    // Close completion overlay if open
    const overlay = document.getElementById('completionOverlay');
    if (overlay.classList.contains('visible')) {
      closeCompletion();
      return;
    }
    // Otherwise go back
    goBack();
  }
});

// ========== INIT ==========
initTheme();
updateWelcomeProgress();
</script>
</body>
</html>
