  color: var(--primary);
  cursor: pointer;
  vertical-align: middle;
  transition: all var(--transition);
}
.fib-blank:hover { border-color: var(--primary); }
.fib-blank.filled { border-style: solid; border-color: var(--primary); background: var(--primary-light); }
.fib-blank.correct-blank { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
.fib-blank.incorrect-blank { border-color: var(--incorrect); background: var(--incorrect-bg); color: var(--incorrect); }

.word-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.word-bank-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 10px;
  width: 100%;
}
.word-chip {
  padding: 8px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition);
}
.word-chip:hover:not(.used) { border-color: var(--primary); background: var(--primary-light); }
.word-chip:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.word-chip.used { opacity: 0.35; cursor: default; text-decoration: line-through; }

/* Match Symbol */
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.match-column-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-align: center;
}
.match-item {
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
  line-height: 1.4;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.match-item:hover:not(.matched):not(.disabled) { border-color: var(--primary); }
.match-item:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.match-item.selected { border-color: var(--secondary); background: var(--secondary-light); box-shadow: 0 0 0 2px var(--secondary-light); }
.match-item.matched { border-color: var(--correct); background: var(--correct-bg); cursor: default; opacity: 0.8; }
.match-item.wrong { border-color: var(--incorrect); background: var(--incorrect-bg); animation: shake 0.4s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

/* Order Events */
.order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.order-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  transition: all var(--transition);
  line-height: 1.4;
}
.order-item:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.order-number {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.order-text { flex: 1; }
.order-controls {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.order-btn {
  width: 28px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  transition: all var(--transition);
}
.order-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
.order-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
.order-btn:disabled { opacity: 0.3; cursor: default; }

.order-item.correct-order { border-color: var(--correct); background: var(--correct-bg); }
.order-item.incorrect-order { border-color: var(--incorrect); background: var(--incorrect-bg); }

/* Puzzle feedback & buttons */
.puzzle-check-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.puzzle-check-btn:hover { background: var(--primary-hover); }
.puzzle-check-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
.puzzle-check-btn:disabled { opacity: 0.5; cursor: default; }

.puzzle-feedback {
  padding: 16px 20px;
  border-radius: var(--radius-md);
  margin-top: 16px;
  font-size: 15px;
  font-weight: 600;
  animation: fadeIn 0.3s ease;
  line-height: 1.5;
}
.puzzle-feedback.success {
  background: var(--correct-bg);
  border: 1px solid var(--correct);
  color: var(--correct);
}
.puzzle-feedback.error {
  background: var(--incorrect-bg);
  border: 1px solid var(--incorrect);
  color: var(--incorrect);
}

.puzzle-actions {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.puzzle-reset-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  background: transparent;
  color: var(--text-muted);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.puzzle-reset-btn:hover { border-color: var(--text-muted); color: var(--text); }
.puzzle-reset-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

/* ========== FOOTER ========== */
.app-footer {
  padding: 20px 0;
  text-align: center;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.app-footer a {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color var(--transition);
}
.app-footer a:hover { color: var(--secondary); }

/* ========== CHAPTER COMPLETION OVERLAY ========== */
.completion-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}
.completion-overlay.visible { display: flex; }
.completion-card {
  background: var(--surface);
  border-radius: var(--radius-xl);
  padding: 40px 32px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.completion-icon {
  font-size: 56px;
  margin-bottom: 16px;
}
.completion-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.completion-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  line-height: 1.5;
}
.completion-btn {
  padding: 12px 28px;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.completion-btn:hover { background: var(--primary-hover); }
.completion-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .app-container { padding: 0 16px; }
  .match-grid { grid-template-columns: 1fr; gap: 8px; }
  .match-grid .match-column { margin-bottom: 16px; }
  .tabs { gap: 2px; padding: 3px; }
  .tab-btn { padding: 8px 8px; font-size: 13px; }
  .verse-card { padding: 20px; }
  .fib-template { padding: 16px; }
  .welcome { padding: 40px 0; }
  .tf-buttons { flex-direction: column; }
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== FOCUS STYLES ========== */
:focus { outline: none; }
:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

/* Screen reader only */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

/* Devotional complete marker */
.devotional-done-section {
  text-align: center;
  padding: 24px 0 8px;
}
.devotional-done-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.devotional-done-btn:hover { background: var(--primary-hover); }
.devotional-done-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
.devotional-done-btn.completed {
  background: var(--correct-bg);
  color: var(--correct);
  border: 1px solid var(--correct);
  cursor: default;
}
</style>
</head>

const CHAPTERS = [{"chapter": 1, "title": "Horsemen Among the Myrtles", "devotional": {"summary": "Zechariah opens with a warm but urgent invitation: return to God, and He will return to you. In the first of eight night visions, Zechariah sees a mysterious rider on a red horse standing among myrtle trees in a glen, accompanied by a heavenly patrol that reports the whole earth is at peaceful rest. The Angel of the LORD intercedes for Jerusalem, and God responds with tender reassurance — He has not forgotten His city, He is jealous for it, and He will return in mercy to see His house rebuilt. A second vision reinforces the promise: four craftsmen are sent to overthrow the very nations that had oppressed Israel.", "key_themes": ["Returning to God", "Divine Jealousy and Comfort"], "featured_verse": {"reference": "Zechariah 1:3", "text": "Therefore say to them, Thus declares the LORD of hosts: Return to me, says the LORD of hosts, and I will return to you, says the LORD of hosts."}, "reflection_prompts": ["Where in my life do I need to hear the invitation to 'return' to God today?", "How does it change my perspective to know that God is actively jealous — deeply invested — in my wellbeing and restoration?", "What 'myrtle tree moments' have I experienced — times when I felt low and overlooked, but God was actually present and interceding?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What color was the horse ridden by the man standing among the myrtle trees?", "options": ["C) Black", "B) White", "D) Dappled", "A) Red"], "correct": 3, "explanation": "Zechariah 1:8 describes the man riding a red horse, standing among the myrtle trees in the glen."}, {"type": "multiple_choice", "question": "What did the heavenly patrol report about the condition of the earth?", "options": ["D) The nations are in great turmoil", "C) Jerusalem has been rebuilt", "A) All the earth is at rest and in peace", "B) War is spreading among the nations"], "correct": 2, "explanation": "Zechariah 1:11 records the patrol reporting: 'We have patrolled the earth, and behold, all the earth remains at rest.'"}, {"type": "multiple_choice", "question": "What were the four craftsmen (smiths) sent to do?", "options": ["B) Rebuild the walls of Jerusalem", "D) Deliver a message to the high priest", "C) Measure the dimensions of the new temple", "A) Terrify and cast down the four horns that scattered Israel"], "correct": 3, "explanation": "Zechariah 1:21 explains: 'These have come to terrify them, to cast down the horns of the nations who lifted up their horns against the land of Judah to scatter it.'"}, {"type": "multiple_choice", "question": "What did the four horns represent in Zechariah's second vision?", "options": ["B) The four corners of the new temple", "C) Four angels standing before God", "A) The nations that scattered Judah, Israel, and Jerusalem", "D) The four seasons of the exile"], "correct": 2, "explanation": "Zechariah 1:19 states: 'These are the horns that have scattered Judah, Israel, and Jerusalem.'"}, {"type": "true_false", "question": "True or False: In Zechariah 1, God says He is only slightly displeased with the nations that oppressed Israel.", "correct": false, "explanation": "God says He is 'exceedingly angry' with the nations (Zechariah 1:15), because they furthered Israel's disaster beyond what God intended."}]}, "puzzle": {"type": "fill_in_blank", "verse_reference": "Zechariah 1:3", "template": "Therefore say to them, Thus declares the ____ of hosts: ____ to me, says the LORD of hosts, and I will ____ to you, says the LORD of ____.", "words": ["hosts", "Return", "LORD", "return"], "answers": ["LORD", "Return", "return", "hosts"]}}, {"chapter": 2, "title": "A Wall of Fire", "devotional": {"summary": "In this vision, a young man sets out to measure Jerusalem with a surveyor's line — but an angel rushes to stop him with astonishing news. The city God is planning cannot be contained by any wall, because it will overflow with people and life. God Himself will be its wall of fire and its inner glory. The chapter then shifts to an urgent call for scattered Jewish exiles still in Babylon to come home before judgment falls, with the stunning promise that many nations — not just Israel — will one day join themselves to the LORD. The vision ends with a call for all creation to be still before God.", "key_themes": ["God's Protecting Presence", "Universal Blessing"], "featured_verse": {"reference": "Zechariah 2:5", "text": "And I will be to her a wall of fire all around, declares the LORD, and I will be the glory in her midst."}, "reflection_prompts": ["Where am I trying to 'measure' or limit what God can do, when He may be planning something far bigger than my expectations?", "How does knowing I am the 'apple of God's eye' — the most carefully guarded thing to Him — change how I face today's challenges?", "What does it mean for me personally that God promises to be both a wall of protection around me and a source of glory within me?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What was the young man carrying as he went out in the vision?", "options": ["B) A golden lamp", "C) A scroll", "D) A basket of grain", "A) A measuring line"], "correct": 3, "explanation": "Zechariah 2:1 says: 'And I lifted my eyes and saw, and behold, a man with a measuring line in his hand!'"}, {"type": "multiple_choice", "question": "Why was Jerusalem told it would not need ordinary walls?", "options": ["B) Because all its enemies had already been destroyed", "D) Because the people were too poor to build walls", "C) Because the old walls were still standing", "A) Because it would be inhabited as villages without walls, due to the multitude of people and livestock"], "correct": 3, "explanation": "Zechariah 2:4 explains: 'Jerusalem shall be inhabited as villages without walls, because of the multitude of people and livestock in it.'"}, {"type": "multiple_choice", "question": "What phrase does God use to describe how precious Israel is to Him?", "options": ["C) His firstborn son", "B) A treasure among the nations", "A) The apple of his eye", "D) A light to the world"], "correct": 2, "explanation": "Zechariah 2:8 states that he who touches Israel 'touches the apple of his eye' — the most sensitive and carefully guarded part of the body."}, {"type": "true_false", "question": "True or False: In Zechariah 2, God promises that Jerusalem will be rebuilt with strong stone walls for protection.", "correct": false, "explanation": "God promises something better than walls — He declares He will be 'a wall of fire all around' Jerusalem (Zechariah 2:5), replacing physical fortifications with His own presence."}, {"type": "multiple_choice", "question": "What does God promise will happen with 'many nations' in Zechariah 2:11?", "options": ["B) Many nations will pay tribute to Jerusalem", "D) Many nations will send workers to rebuild the temple", "A) Many nations shall join themselves to the LORD and be His people", "C) Many nations will be defeated by Israel"], "correct": 2, "explanation": "Zechariah 2:11 declares: 'And many nations shall join themselves to the LORD in that day, and shall be my people.'"}]}, "puzzle": {"type": "match_symbol", "pairs": [{"symbol": "Man with a measuring line", "description": "A young man who set out to measure Jerusalem's width and length"}, {"symbol": "Wall of fire", "description": "God's supernatural protection encircling Jerusalem, replacing physical fortifications"}, {"symbol": "Apple of his eye", "description": "A phrase describing Israel's preciousness and God's fierce protection over her"}, {"symbol": "Daughter of Babylon", "description": "The land to the north where scattered Jews were urged to flee from before judgment"}, {"symbol": "Daughter of Zion", "description": "The name used to call God's people to sing and rejoice at His coming"}]}}, {"chapter": 3, "title": "A Brand Plucked from the Fire", "devotional": {"summary": "In this deeply moving vision, the high priest Joshua stands before God in filthy garments while Satan stands ready to accuse him. But God silences the accuser, describing Joshua as 'a brand plucked from the fire' — a stick snatched from destruction at the last possible moment. God commands Joshua's filthy clothes to be stripped away and replaced with clean priestly vestments and a fresh turban. This act of grace then opens into a magnificent promise: a coming figure called the Branch will one day remove the land's entire iniquity in a single day. The whole vision pulses with the assurance that God is in the business of cleaning up what sin has soiled.", "key_themes": ["Cleansing from Sin", "Messianic Hope"], "featured_verse": {"reference": "Zechariah 3:4", "text": "And the angel said to those who were standing before him, \"Remove the filthy garments from him.\" And to him he said, \"Behold, I have taken your iniquity away from you, and I will clothe you with pure vestments.\""}, "reflection_prompts": ["Where in my life do I feel like 'a brand plucked from the fire' — rescued from something I didn't deserve to survive?", "How does the image of God silencing my accuser and replacing my 'filthy garments' with clean ones speak to how I see my own standing before Him?", "What would it look like for me to walk in the clean vestments God has already given me, rather than still acting as if I'm wearing the old, dirty ones?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "Who was standing at Joshua's right hand in the vision to accuse him?", "options": ["A) Satan", "C) Zerubbabel", "B) An angel of judgment", "D) The king of Persia"], "correct": 0, "explanation": "Zechariah 3:1 says: 'Then he showed me Joshua the high priest standing before the angel of the LORD, and Satan standing at his right hand to accuse him.'"}, {"type": "multiple_choice", "question": "What vivid image does God use to describe His rescue of Joshua?", "options": ["C) A ship saved from a storm", "D) A seed planted in good soil", "A) A brand plucked from the fire", "B) A lamb rescued from a lion"], "correct": 2, "explanation": "Zechariah 3:2 records God saying: 'Is not this a brand plucked from the fire?' — describing a burning stick rescued at the last moment from destruction."}, {"type": "multiple_choice", "question": "What was placed on Joshua's head as part of his restoration?", "options": ["C) A wreath of myrtle", "B) A crown of gold", "D) A silver diadem", "A) A clean turban"], "correct": 3, "explanation": "Zechariah 3:5 records: 'And I said, \"Let them put a clean turban on his head.\" So they put a clean turban on his head and clothed him with garments.'"}, {"type": "multiple_choice", "question": "How many eyes does the special stone set before Joshua have?", "options": ["D) One", "C) Two", "B) Four", "A) Seven"], "correct": 3, "explanation": "Zechariah 3:9 describes 'a single stone with seven eyes,' representing divine omniscience and the completeness of God's redemptive plan."}, {"type": "true_false", "question": "True or False: God promises in Zechariah 3 to remove the iniquity of the land in a single day.", "correct": true, "explanation": "Zechariah 3:9 declares: 'I will remove the iniquity of this land in a single day' — a promise pointing forward to the Messiah's atoning work."}]}, "puzzle": {"type": "order_events", "events": ["Satan stands at Joshua's right hand to accuse him", "The LORD rebukes Satan and declares Joshua a brand plucked from the fire", "The angel commands the filthy garments to be removed from Joshua", "Joshua is clothed with pure vestments and a clean turban", "God promises to bring His servant the Branch", "God declares He will remove the iniquity of the land in a single day"], "shuffled_order": [3, 0, 5, 1, 4, 2]}}, {"chapter": 4, "title": "Not by Might", "devotional": {"summary": "An angel wakes Zechariah like a man roused from sleep and shows him a golden lampstand burning brilliantly — not because anyone is refilling it, but because two olive trees on either side pipe oil directly into it. When Zechariah asks what this means, he receives one of the most quoted words in the entire Old Testament: 'Not by might, nor by power, but by my Spirit.' The vision is God's direct word to Zerubbabel, the governor struggling to finish the half-built temple: every obstacle before him will flatten into a plain, and the same hands that laid the foundation will finish the work. Even the 'small things' of faithful daily obedience matter deeply to God.", "key_themes": ["Spirit-Empowered Work", "God's Omniscience and Care"], "featured_verse": {"reference": "Zechariah 4:6", "text": "Then he said to me, \"This is the word of the LORD to Zerubbabel: Not by might, nor by power, but by my Spirit, says the LORD of hosts.\""}, "reflection_prompts": ["What 'great mountain' in my life feels impossible right now, and how does this promise that it will become a plain speak to me?", "Where am I relying more on my own strength or resources than on God's Spirit to accomplish something He has called me to?", "How does knowing that God cares about 'the day of small things' encourage me in the ordinary, unglamorous faithfulness of today?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What was the source of oil for the lampstand in the vision?", "options": ["D) Seven priests who poured oil continuously", "B) A large golden pitcher carried by an angel", "A) Two olive trees on either side of it", "C) A river of oil flowing beneath the lampstand"], "correct": 2, "explanation": "Zechariah 4:3 and 4:12 describe two olive trees (and their branches) supplying golden oil directly through pipes to the lampstand, with no human refilling required."}, {"type": "multiple_choice", "question": "To whom was the oracle 'Not by might, nor by power, but by my Spirit' directly addressed?", "options": ["C) Zechariah himself", "D) The returning exiles", "B) Joshua the high priest", "A) Zerubbabel"], "correct": 3, "explanation": "Zechariah 4:6 specifies: 'This is the word of the LORD to Zerubbabel' — the governor responsible for completing the temple."}, {"type": "multiple_choice", "question": "What will happen to the 'great mountain' before Zerubbabel?", "options": ["A) It will become a plain", "B) It will be split in two", "D) It will sink into the sea", "C) It will be set on fire"], "correct": 0, "explanation": "Zechariah 4:7 declares: 'Who are you, O great mountain? Before Zerubbabel you shall become a plain.'"}, {"type": "true_false", "question": "True or False: The seven lamps of the lampstand are identified as the seven eyes of the LORD that range through the whole earth.", "correct": true, "explanation": "Zechariah 4:10 confirms: 'These seven are the eyes of the LORD, which range through the whole earth' — symbolizing God's perfect omniscience."}, {"type": "multiple_choice", "question": "What are the 'two anointed ones' standing beside the Lord of the whole earth identified as in this vision?", "options": ["D) Two stone tablets of the law", "A) The two olive trees flanking the lampstand", "C) Two golden pillars at the temple entrance", "B) Two angels holding trumpets"], "correct": 1, "explanation": "Zechariah 4:14 identifies 'the two anointed ones who stand by the Lord of the whole earth' as the two olive trees — representing Zerubbabel and Joshua, the civil and priestly leaders of the restoration."}]}, "puzzle": {"type": "fill_in_blank", "verse_reference": "Zechariah 4:6", "template": "Then he said to me, \"This is the word of the ____ to Zerubbabel: Not by ____, nor by ____, but by my ____, says the LORD of hosts.\"", "words": ["Spirit", "might", "LORD", "power"], "answers": ["LORD", "might", "power", "Spirit"]}}, {"chapter": 5, "title": "The Scroll and the Basket", "devotional": {"summary": "Chapter 5 contains two remarkable visions about what God intends to sweep out of His restored community. First, a gigantic flying scroll — as large as a building — soars across the land carrying a divine curse against every thief and every person who swears falsely by God's name, entering their homes and consuming them entirely. Then comes an even stranger sight: a woman labeled 'Wickedness' is stuffed into a measuring basket, sealed with a lead cover, and carried off by two winged women to be housed permanently in Babylon. Together, these visions carry a bracing but ultimately hopeful message: God's new community will be genuinely holy, because He will root out and remove what corrupts it.", "key_themes": ["Divine Judgment Against Sin", "Purification of the Community"], "featured_verse": {"reference": "Zechariah 5:4", "text": "I will send it out, declares the LORD of hosts, and it shall enter the house of the thief, and the house of him who swears falsely by my name. And it shall remain in his house and consume it, both timber and stones."}, "reflection_prompts": ["How does knowing that God takes specific sins seriously — naming them and addressing them — both challenge and reassure me?", "Where in my life might I be tolerating 'wickedness in the basket' rather than letting God remove it fully?", "What does the vision of wickedness being permanently removed and contained say to me about God's ultimate purpose for the communities He builds?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What were the dimensions of the flying scroll in the vision?", "options": ["B) Ten cubits long and five cubits wide", "D) Five cubits long and five cubits wide", "C) Forty cubits long and twenty cubits wide", "A) Twenty cubits long and ten cubits wide"], "correct": 3, "explanation": "Zechariah 5:2 specifies the scroll was 'twenty cubits long and ten cubits wide' — dimensions matching the porch of Solomon's temple."}, {"type": "multiple_choice", "question": "What two categories of sinners does the flying scroll's curse specifically target?", "options": ["B) Murderers and idolaters", "D) Those who oppress the poor and those who worship false gods", "A) Thieves and those who swear falsely by God's name", "C) Adulterers and Sabbath-breakers"], "correct": 2, "explanation": "Zechariah 5:3-4 identifies thieves (violating the eighth commandment) and those who swear falsely by God's name (violating the third commandment)."}, {"type": "multiple_choice", "question": "What was the woman inside the ephah basket explicitly named?", "options": ["D) Sorrow", "C) Foolishness", "B) Idolatry", "A) Wickedness"], "correct": 3, "explanation": "Zechariah 5:8 states plainly: 'And he said, \"This is Wickedness.\"' — the woman is an embodiment of evil being removed from the land."}, {"type": "multiple_choice", "question": "Where was the ephah basket carried to by the two winged women?", "options": ["A) The land of Shinar (Babylon)", "B) Egypt", "C) The desert of Sinai", "D) The Mediterranean Sea"], "correct": 0, "explanation": "Zechariah 5:11 says the basket was taken to 'the land of Shinar' — the ancient name for Babylon, the historic home of rebellion and idolatry."}, {"type": "true_false", "question": "True or False: The flying scroll in Zechariah 5 only curses people after they appear before a judge and are found guilty.", "correct": false, "explanation": "The scroll actively 'goes out' across the whole land and enters the houses of sinners directly (Zechariah 5:3-4) — there is no delay or human tribunal required. God's judgment reaches into the home itself."}]}, "puzzle": {"type": "match_symbol", "pairs": [{"symbol": "Flying scroll", "description": "A massive aerial document carrying God's curse against theft and false swearing across the whole land"}, {"symbol": "Ephah basket", "description": "A standard commercial measuring container used to contain and remove wickedness from the land"}, {"symbol": "Lead cover", "description": "A heavy lid that seals the basket shut, representing God's containment of evil"}, {"symbol": "Woman labeled Wickedness", "description": "The personification of evil thrust back into the basket by the angel"}, {"symbol": "Two women with stork wings", "description": "Winged figures who carry the basket of wickedness away to Babylon"}, {"symbol": "Shinar", "description": "The ancient name for Babylon, the destination where wickedness is permanently housed"}]}}, {"chapter": 6, "title": "Chariots and a Crown", "devotional": {"summary": "The eight night visions come to a climax with four war chariots thundering out from between two bronze mountains, ranging across the whole earth as God's judgment force. The black and white horses head north toward Babylon, setting God's Spirit at rest — the long oppressor has been dealt with. Then the visions end and something unexpected happens: Zechariah is told to make a crown and place it not on the head of the governor, but on the head of Joshua the high priest. This act is a living prophecy pointing to a coming figure called the Branch, who will uniquely hold both royal and priestly authority — and bring a peace that only that combination can secure.", "key_themes": ["God's Sovereign Judgment", "The Coming Priest-King"], "featured_verse": {"reference": "Zechariah 6:12-13", "text": "And say to him, 'Thus says the LORD of hosts, \"Behold, the man whose name is the Branch: for he shall branch out from his place, and he shall build the temple of the LORD. It is he who shall build the temple of the LORD and shall bear royal honor, and shall sit and rule on his throne. And there shall be a priest on his throne, and the counsel of peace shall be between them both.\"'"}, "reflection_prompts": ["What 'north country' in my life — some long-standing source of oppression or fear — do I need to trust that God's Spirit has already been sent to address?", "How does the vision of Jesus as both King and Priest — the one who rules and the one who intercedes for me — change how I relate to Him in prayer?", "What does the promise that the Branch will bring 'the counsel of peace' mean for an area of my life where I am searching for peace right now?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What were the four chariots in the vision explicitly identified as?", "options": ["A) The four winds of heaven, after presenting themselves before the Lord of all the earth", "C) Four angels carrying bowls of judgment", "D) The horsemen of the four seasons", "B) The armies of the four great empires"], "correct": 0, "explanation": "Zechariah 6:5 states: 'These are the four winds of heaven, after presenting themselves before the Lord of all the earth.'"}, {"type": "multiple_choice", "question": "Which direction did the black and white horses travel, and what does that direction represent?", "options": ["A) North, toward Babylon", "D) West, toward the sea", "C) East, toward Persia", "B) South, toward Egypt"], "correct": 0, "explanation": "Zechariah 6:6 says the black horses go to the north country and the white follow — north being the direction Babylon lay relative to Jerusalem, representing God's judgment reaching the oppressor."}, {"type": "multiple_choice", "question": "On whose head did Zechariah place the crown that was made from silver and gold?", "options": ["B) Zerubbabel the governor", "D) Heldai, the leader of the delegation", "C) The prophet Zechariah himself", "A) Joshua the high priest"], "correct": 3, "explanation": "Zechariah 6:11 instructs: 'Take from them silver and gold, and make a crown, and set it on the head of Joshua, the son of Jehozadak, the high priest.'"}, {"type": "true_false", "question": "True or False: The crown placed on Joshua was to be kept by him permanently as a symbol of his personal authority.", "correct": false, "explanation": "Zechariah 6:14 says the crown was to 'be in the temple of the LORD as a reminder' — it was a prophetic memorial pointing to the coming Branch, not a personal grant of royal authority to Joshua."}, {"type": "multiple_choice", "question": "According to Zechariah 6:15, what condition is attached to the promise that 'those who are far off shall come and help to build the temple of the LORD'?", "options": ["C) If the governor and priest work together in unity", "D) If the nations stop opposing the work", "A) If you will diligently obey the voice of the LORD your God", "B) If you complete the temple before winter"], "correct": 2, "explanation": "Zechariah 6:15 closes with: 'And this shall come to pass, if you will diligently obey the voice of the LORD your God.'"}]}, "puzzle": {"type": "order_events", "events": ["Four chariots with colored horses emerge from between two bronze mountains", "The angel identifies the chariots as the four winds of heaven", "The black and white horses travel north toward Babylon", "The angel announces that God's Spirit has been set at rest in the north country", "Zechariah is instructed to make a crown from silver and gold", "The crown is placed on Joshua's head as a sign of the coming Branch"], "shuffled_order": [4, 1, 5, 2, 0, 3]}}, {"chapter": 7, "title": "What God Really Wants", "devotional": {"summary": "Two years after the night visions, a delegation arrives in Jerusalem with a practical religious question: should they keep fasting the way they did during the exile? God's response cuts to the heart. He asks whether their fasts were ever truly for Him in the first place — and whether their eating and drinking was either. What God has always wanted, the former prophets all testified, is not a careful calendar of religious rituals but a community that renders honest justice, shows genuine kindness, and protects the most vulnerable. The chapter closes with a sobering look at why the exile happened at all: the ancestors had made their hearts as hard as diamond, refused to listen, and reaped the whirlwind.", "key_themes": ["Obedience Over Ritual", "Justice and Compassion"], "featured_verse": {"reference": "Zechariah 7:9-10", "text": "\"Thus says the LORD of hosts, Render true judgments, show kindness and mercy to one another, do not oppress the widow, the fatherless, the sojourner, or the poor, and let none of you devise evil against another in your heart.\""}, "reflection_prompts": ["When I engage in spiritual practices — fasting, prayer, church attendance — am I honestly doing them for God, or primarily for how they make me feel about myself?", "Who are the 'widow, fatherless, sojourner, or poor' in my immediate circle or community, and what would it look like for me to show them kindness and mercy this week?", "Where might I be developing a 'diamond-hard' area of resistance to something God has been saying to me, and what would it take to soften that place?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What specific question did the delegation from Bethel come to ask?", "options": ["C) Whether Jews still in Babylon should return to Jerusalem", "A) Whether they should continue fasting in the fifth and seventh months as they had done for seventy years", "B) Whether the temple would be finished before the next Passover", "D) Whether the old land boundaries would be restored"], "correct": 1, "explanation": "Zechariah 7:3 records their question: 'Should I weep and abstain in the fifth month, as I have done for so many years?' — referring to the exile-era fasts."}, {"type": "multiple_choice", "question": "What four vulnerable groups does God specifically command the people to care for in Zechariah 7:10?", "options": ["B) The sick, the prisoner, the orphan, and the foreigner", "D) The poor, the hungry, the blind, and the lame", "A) The widow, the fatherless, the sojourner, and the poor", "C) The elderly, the widow, the slave, and the stranger"], "correct": 2, "explanation": "Zechariah 7:10 lists: 'do not oppress the widow, the fatherless, the sojourner, or the poor' — these four groups represent society's most vulnerable members."}, {"type": "multiple_choice", "question": "What image is used to describe how hard the ancestors' hearts had become?", "options": ["D) Stiff as bronze", "C) Cold as iron", "B) Hard as stone", "A) Diamond-hard"], "correct": 3, "explanation": "Zechariah 7:12 says 'they made their hearts diamond-hard' — the Hebrew word 'shamir' refers to the hardest known stone, used for engraving."}, {"type": "true_false", "question": "True or False: The fasts in the fifth and seventh months that the delegation asked about were commanded by Moses in the Torah.", "correct": false, "explanation": "These were not Mosaic fasts but traditions the community developed during the 70-year exile to commemorate national catastrophes — the destruction of the temple and the assassination of Gedaliah."}, {"type": "multiple_choice", "question": "How does God describe the judgment that fell on the ancestors who refused to listen?", "options": ["B) He sent drought and famine on the land for forty years", "D) He removed His presence from the temple and left it empty", "A) He scattered them with a whirlwind among all the nations and left the land desolate", "C) He caused the nations to imprison them in their own cities"], "correct": 2, "explanation": "Zechariah 7:14 describes the result: 'and I scattered them with a whirlwind among all the nations that they had not known. Thus the land they left was desolate.'"}]}, "puzzle": {"type": "fill_in_blank", "verse_reference": "Zechariah 7:9-10", "template": "Thus says the LORD of hosts, Render true ____, show ____ and mercy to one another, do not oppress the ____, the fatherless, the sojourner, or the ____, and let none of you devise evil against another in your heart.", "words": ["widow", "judgments", "poor", "kindness"], "answers": ["judgments", "kindness", "widow", "poor"]}}, {"chapter": 8, "title": "Fasts Turned to Feasts", "devotional": {"summary": "In a burst of ten short promises, God declares His passionate love for Jerusalem and His firm intention to restore it. He paints a picture of the city full of life — elderly men and women resting in the streets, children laughing and playing freely — a scene almost unimaginable to the weary, returned exiles. The agricultural hardships of exile will give way to abundance, and the people who were once a source of shame among the nations will become a source of blessing. Most remarkably, the seasons of mourning and fasting they have kept will be transformed into feasts of joy. The chapter ends with a breathtaking promise: people from every nation will seek the LORD through Israel, saying, 'Let us go with you, for we have heard that God is with you.'", "key_themes": ["Covenant Renewal", "Universal Blessing"], "featured_verse": {"reference": "Zechariah 8:13", "text": "And as you have been a byword of cursing among the nations, O house of Judah and house of Israel, so will I save you, and you shall be a blessing. Fear not, but let your hands be strong."}, "reflection_prompts": ["Where in my life am I waiting for a fast to be turned into a feast — and how does God's faithfulness to Israel encourage me to keep hoping?", "How can I be someone who draws others toward God, so that those around me sense 'God is with you'?", "What does it mean for me personally that God's zeal — his fierce, passionate love — is directed toward his people?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "What does God say Jerusalem will be called in Zechariah 8:3?", "options": ["D) The city of David and the mountain of fire", "B) The city of peace and the golden hill", "A) The faithful city and the holy mountain", "C) The holy city and the blessed land"], "correct": 2, "explanation": "Zechariah 8:3 says God will dwell in Jerusalem and it will be called 'the faithful city' and 'the mountain of the LORD of hosts, the holy mountain.'"}, {"type": "multiple_choice", "question": "In the vision of restored Jerusalem in Zechariah 8:4–5, who fills the streets of the city?", "options": ["A) Old men and women with staffs, and children playing", "B) Merchants and traders from every nation", "C) Soldiers and priests in procession", "D) Prophets and singers praising God"], "correct": 0, "explanation": "Zechariah 8:4–5 describes old men and women sitting with staffs in the streets and children playing — a picture of safety and flourishing across generations."}, {"type": "multiple_choice", "question": "According to Zechariah 8:19, what will happen to the fasts of the fourth, fifth, seventh, and tenth months?", "options": ["C) They will be observed only in the temple", "A) They will become seasons of joy, gladness, and cheerful feasts", "D) They will be forgotten and no longer observed", "B) They will be extended for an additional month"], "correct": 1, "explanation": "Zechariah 8:19 declares these four commemorative fasts — which mourned stages of Jerusalem's fall — will become 'seasons of joy and gladness and cheerful feasts.'"}, {"type": "multiple_choice", "question": "In Zechariah 8:23, how many men from the nations take hold of the robe of a Jew?", "options": ["A) Ten", "D) Forty", "C) Twelve", "B) Seven"], "correct": 0, "explanation": "Zechariah 8:23 describes ten men from the nations of every tongue grabbing the robe of a Jew, saying, 'Let us go with you, for we have heard that God is with you.'"}, {"type": "true_false", "question": "True or False: In Zechariah 8, God says he will gather his people only from the east.", "correct": false, "explanation": "Zechariah 8:7 says God will save his people 'from the east country and from the west country' — gathering them from all directions, not just the east."}]}, "puzzle": {"type": "fill_in_blank", "verse_reference": "Zechariah 8:13", "template": "And as you have been a ____ of cursing among the nations, O house of ____ and house of Israel, so will I ____ you, and you shall be a ____. Fear not, but let your hands be ____.", "words": ["strong", "Judah", "byword", "blessing", "save"], "answers": ["byword", "Judah", "save", "blessing", "strong"]}}, {"chapter": 9, "title": "Here Comes Your King", "devotional": {"summary": "This chapter opens with divine judgment sweeping through the proud kingdoms surrounding Israel, clearing the way for something far greater. At its heart is one of the most celebrated prophecies in the entire Old Testament: a King is coming — righteous, victorious, and humble — riding not on a war horse but on a donkey. This King will bring an end to warfare and speak peace to the nations, ruling from one end of the earth to the other. The chapter closes with joyful images of God fighting for his people like a warrior and his redeemed shining like jewels on his land. Every word points forward to Jesus' triumphal entry into Jerusalem and the peace-bearing kingdom he inaugurated.", "key_themes": ["The Humble Messiah", "Eschatological Peace"], "featured_verse": {"reference": "Zechariah 9:9", "text": "Rejoice greatly, O daughter of Zion! Shout aloud, O daughter of Jerusalem! Behold, your king is coming to you; righteous and having salvation is he, humble and mounted on a donkey, on a colt, the foal of a donkey."}, "reflection_prompts": ["How does the image of a king arriving on a donkey challenge my expectations of what power and leadership should look like?", "Where do I need to 'rejoice greatly' today, trusting that this humble King is still coming and still reigning?", "What does it mean for my daily life that this King has already spoken peace to the nations — and that his rule reaches to the ends of the earth?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "In Zechariah 9:9, what animal is the coming King described as riding?", "options": ["A) A donkey, on a colt, the foal of a donkey", "B) A white war horse", "C) A camel", "D) A young lion"], "correct": 0, "explanation": "Zechariah 9:9 specifically describes the King as 'humble and mounted on a donkey, on a colt, the foal of a donkey' — fulfilled in Jesus' triumphal entry in Matthew 21."}, {"type": "multiple_choice", "question": "According to Zechariah 9:10, what will the coming King cut off from Jerusalem?", "options": ["B) The temple sacrifices", "D) The foreign traders", "A) The war horse and battle bow", "C) The throne of David"], "correct": 2, "explanation": "Zechariah 9:10 says God 'will cut off the chariot from Ephraim and the war horse from Jerusalem; and the battle bow shall be cut off' — the King brings peace by removing the instruments of war."}, {"type": "multiple_choice", "question": "In Zechariah 9:11, what does God reference as the basis for freeing his 'prisoners from the waterless pit'?", "options": ["B) The law given to Moses", "C) The prayers of the people", "A) The blood of my covenant", "D) The faithfulness of the priests"], "correct": 2, "explanation": "Zechariah 9:11 says 'because of the blood of my covenant with you, I will set your prisoners free from the waterless pit' — a powerful image pointing to covenantal redemption."}, {"type": "multiple_choice", "question": "How are God's redeemed people described in Zechariah 9:16?", "options": ["B) Like a mighty army in the field", "C) Like wheat stored in his barn", "D) Like stars scattered across the sky", "A) Like the jewels of a crown shining on his land"], "correct": 3, "explanation": "Zechariah 9:16 says 'like the jewels of a crown they shall shine on his land' — a beautiful image of the worth and glory of God's redeemed people."}, {"type": "true_false", "question": "True or False: Zechariah 9:9 describes the coming King as 'righteous and having salvation.'", "correct": true, "explanation": "Zechariah 9:9 calls the King 'righteous and having salvation' (or 'victorious/saved') — he comes in righteousness and brings deliverance with him."}]}, "puzzle": {"type": "match_symbol", "pairs": [{"symbol": "King on a donkey", "description": "Royalty expressed through humility, not military might"}, {"symbol": "Prisoners in the waterless pit", "description": "God's people held in spiritual and physical bondage, awaiting redemption"}, {"symbol": "Judah as God's bow, Ephraim as God's arrow", "description": "The reunited people of Israel used as God's own instruments of victory"}, {"symbol": "Jewels of a crown", "description": "The inestimable worth of the redeemed people shining on God's land"}, {"symbol": "The battle bow cut off", "description": "The Messiah's reign brings an end to the instruments of warfare"}]}}, {"chapter": 10, "title": "The Shepherd Who Gathers", "devotional": {"summary": "God's people have been led astray by false guides — household idols, smooth-talking diviners — and they wander like sheep with no one to lead them well. But God is not indifferent to this. He declares his anger at the negligent shepherds and promises to raise up from within Judah a cornerstone, a secure tent peg, and a battle bow: a leader who is foundational, reliable, and victorious all at once. Then comes a stunning promise of homecoming — God will 'whistle' for his scattered people and bring them back from the farthest corners of the earth, crossing rivers and leveling mountains on their behalf. The chapter ends with a people who are strong in the LORD and who walk in his name.", "key_themes": ["False Leadership vs. the True Shepherd", "The Great Regathering"], "featured_verse": {"reference": "Zechariah 10:4", "text": "From him shall come the cornerstone, from him the tent peg, from him the battle bow, from him every ruler—all of them together."}, "reflection_prompts": ["Where have I been tempted to look for guidance in places that offer 'empty consolation' instead of turning to God directly?", "How does knowing that God personally gathers his scattered sheep — that he 'whistles' for them — affect the way I see people who feel lost or far from him?", "What does it mean for me that Jesus is my cornerstone, my tent peg, and my battle bow — foundational, secure, and victorious?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "According to Zechariah 10:2, what is the result of people following household gods and diviners?", "options": ["B) The people become strong warriors", "A) The people wander like sheep with no shepherd", "C) The people are exiled to Babylon", "D) The people build false temples"], "correct": 1, "explanation": "Zechariah 10:2 says household gods 'give empty consolation' and the result is that 'the people wander like sheep; they are afflicted for lack of a shepherd.'"}, {"type": "multiple_choice", "question": "In Zechariah 10:3, what animal does God say he will make the house of Judah like in battle?", "options": ["A) His majestic steed", "C) An eagle with spread wings", "B) A fierce lion", "D) A mighty ox"], "correct": 0, "explanation": "Zechariah 10:3 says God 'will make the house of Judah like his majestic steed in battle' — transforming a shamed people into an instrument of divine power."}, {"type": "multiple_choice", "question": "In Zechariah 10:4, which of these is NOT listed as coming from Judah?", "options": ["B) The cornerstone", "A) The golden altar", "D) The battle bow", "C) The tent peg"], "correct": 1, "explanation": "Zechariah 10:4 lists the cornerstone, tent peg, battle bow, and every ruler as coming from Judah. A golden altar is not mentioned in this verse."}, {"type": "multiple_choice", "question": "From which two places does God promise to gather his people in Zechariah 10:10?", "options": ["D) The east and the west", "B) Babylon and Persia", "C) Greece and Rome", "A) Egypt and Assyria"], "correct": 3, "explanation": "Zechariah 10:10 specifically names Egypt and Assyria as the places of scattering — evoking Israel's two great historical exiles — from which God will bring his people home."}, {"type": "true_false", "question": "True or False: Zechariah 10:12 says God will make his people strong in themselves through their own efforts.", "correct": false, "explanation": "Zechariah 10:12 says 'I will make them strong in the LORD' — the strength comes from God, not from the people themselves, and they will 'walk in his name.'"}]}, "puzzle": {"type": "order_events", "events": ["The people follow household gods and diviners, wandering like sheep without a shepherd", "God declares his anger against the negligent shepherds who have failed Israel", "God promises that from Judah will come the cornerstone, tent peg, and battle bow", "God signals and gathers his scattered people from Egypt and Assyria", "God strikes down pride in Assyria and the scepter in Egypt", "The people are made strong in the LORD and walk in his name"], "shuffled_order": [3, 0, 5, 1, 4, 2]}}, {"chapter": 11, "title": "The Price of Rejection", "devotional": {"summary": "This chapter is one of the most sobering in all the prophets — a parable of rejection played out in slow, painful detail. God sends a shepherd to care for a flock being exploited and led to slaughter, but the people don't want him. When the shepherd asks what his service was worth to them, they weigh out thirty pieces of silver — the legal price of a slave — and God calls it, with cutting irony, 'the lordly price at which I was priced by them.' The shepherd breaks his two staffs, Favor and Union, enacting the withdrawal of God's protection and the fracturing of Israel's unity. The chapter closes with a stark warning: when the true shepherd is rejected, a worthless one takes his place. For Christian readers, this chapter's shadow falls unmistakably over the betrayal of Jesus.", "key_themes": ["The Rejected Shepherd", "The Consequences of Covenant Breaking"], "featured_verse": {"reference": "Zechariah 11:12–13", "text": "Then I said to them, 'If it seems good to you, give me my wages; but if not, keep them.' And they weighed out as my wages thirty pieces of silver. Then the LORD said to me, 'Throw it to the potter'—the lordly price at which I was priced by them. So I took the thirty pieces of silver and threw them into the house of the LORD, to the potter."}, "reflection_prompts": ["How do I tend to value Jesus — and are there ways I might be treating his presence in my life as something cheap or ordinary?", "What can the image of two broken staffs — Favor and Union — teach me about the cost s 'the feeblest among them on that day shall be like David' — with even the weakest person filled with extraordinary divine empowerment."}, {"type": "multiple_choice", "question": "In Zechariah 12:10, the mourning over the pierced one is compared to grieving for whom?", "options": ["D) A prophet who spoke truth", "B) A king slain in battle", "C) A priest at the altar", "A) An only child and a firstborn"], "correct": 3, "explanation": "Zechariah 12:10 compares the mourning to 'one who mourns for an only child' and one who 'weeps over a firstborn' — the two most devastating personal losses in an ancient context."}, {"type": "multiple_choice", "question": "In Zechariah 12:12–14, how does the mourning take place?", "options": ["B) In one great assembly at the temple", "C) Only through the priests and Levites", "A) Family by family, husbands and wives separately", "D) In the gates of the city on a single day"], "correct": 2, "explanation": "Zechariah 12:12–14 describes the mourning happening 'family by family' — royal, prophetic, priestly, and common families — with husbands and wives mourning separately, emphasizing personal, individual repentance."}, {"type": "true_false", "question": "True or False: In Zechariah 12:1, God identifies himself as the Creator of the heavens, the earth, and the spirit of man.", "correct": true, "explanation": "Zechariah 12:1 frames the entire oracle with God's identity as the one 'who stretches out the heavens and founds the earth and forms the spirit of man within him' — grounding the cosmic scope of the prophecy in God's creative authority."}]}, "puzzle": {"type": "order_events", "events": ["God declares himself as Creator of heavens, earth, and the human spirit", "All the nations of the earth gather against Jerusalem", "God makes Jerusalem a cup of staggering and a heavy stone for the nations", "God supernaturally defends Jerusalem so that the feeblest is like David", "God pours out a spirit of grace and pleas for mercy on the house of d they say 'The LORD is my God' — the complete restoration of the covenant relationship after the refining fire."}]}, "puzzle": {"type": "fill_in_blank", "verse_reference": "Zechariah 13:9", "template": "And I will put this ____ into the fire, and ____ them as one refines silver, and test them as gold is tested. They will call upon my ____, and I will ____ them. I will say, 'They are my people'; and they will say, 'The LORD is my ____.'", "words": ["God", "refine", "third", "name", "answer"], "answers": ["third", "refine", "name", "answer", "God"]}}, {"chapter": 14, "title": "The King Comes Home", "devotional": {"summary": "Zechariah closes with the most sweeping vision in the entire book: the LORD himself arriving on earth, feet touching the Mount of Olives, splitting it open to make a way of escape for his people. Cosmic signs accompany the day — unique light, continuous living waters flowing from Jerusalem to every sea — and the grand declaration that the LORD will be King over all the earth and his name will be one. The nations that opposed Jerusalem will face devastating judgment, while those who survive will stream to Jerusalem every year for the Feast of Booths. The final image is breathtaking in its ordinariness: horse bells and kitchen pots engraved with 'Holy to the LORD,' because in this kingdom, there is nothing left that isn't sacred.", "key_themes": ["The LORD's Physical Return as King", "Universal Holiness"], "featured_verse": {"reference": "Zechariah 14:8–9", "text": "On that day living waters shall flow out from Jerusalem, half of them to the eastern sea and half of them to the western sea. It shall continue in summer as in winter. And the LORD will be king over all the earth. On that day the LORD will be one and his name one."}, "reflection_prompts": ["What does the image of living water flowing in all directions — in summer and winter without fail — tell me about the kind of life God promises to those who are in his kingdom?", "How does the vision of horse bells and cooking pots inscribed 'Holy to the LORD' challenge the way I divide my life into 'spiritual' and 'ordinary' sections?", "When I look at the world's chaos and the gathering of forces against what is good and right, what does this chapter say to me about who ultimately holds the outcome?"]}, "quiz": {"questions": [{"type": "multiple_choice", "question": "According to Zechariah 14:4, where will the LORD's feet stand on the day of his return?", "options": ["A) The Mount of Olives, east of Jerusalem", "D) Mount Carmel by the sea", "C) Mount Sinai in the wilderness", "B) The Temple Mount in Jerusalem"], "correct": 0, "explanation": "Zechariah 14:4 says 'his feet shall stand on the Mount of Olives that lies before Jerusalem on the east' — the same mount from which Jesus ascended into heaven in Acts 1."}, {"type": "multiple_choice", "question": "In Zechariah 14:4, when the LORD stands on the Mount of Olives, what happens to it?", "options": ["A) It splits in two from east to west, creating a great valley", "C) It is consumed by fire and becomes level ground", "D) It sinks into the ground and disappears", "B) It rises up to become the highest mountain on earth"], "correct": 0, "explanation": "Zechariah 14:4 says the Mount of Olives 'shall be split in two from east to west by a very wide valley, so that one half shall move northward, and the other half southward.'"}, {"type": "multiple_choice", "question": "In Zechariah 14:8, where do the living waters flow from Jerusalem?", "options": ["D) Eastward only, into the Jordan River", "A) Half to the eastern sea and half to the western sea", "C) Into the desert to make it bloom", "B) Only northward toward the Sea of Galilee"], "correct": 1, "explanation": "Zechariah 14:8 says living waters flow 'half of them to the eastern sea and half of them to the western sea' — east toward the Dead Sea and west toward the Mediterranean — and continue in both summer and winter."}, {"type": "multiple_choice", "question": "According to Zechariah 14:16, which annual festival must all surviving nations attend in Jerusalem?", "options": ["A) The Feast of Booths (Tabernacles)", "D) The Day of Atonement", "B) The Feast of Passover", "C) The Feast of Weeks (Pentecost)"], "correct": 0, "explanation": "Zechariah 14:16 says survivors from all nations 'shall go up year after year to worship the King, the LORD of hosts, and to keep the Feast of Booths' — the harvest festival of ingathering becomes the emblem of universal Messianic worship."}, {"type": "multiple_choice", "question": "In Zechariah 14:20, what ordinary object will bear the inscription 'Holy to the LORD'?", "options": ["A) The bells of the horses", "B) The gates of the city", "C) The shields of the soldiers", "D) The crowns of the priests"], "correct": 0, "explanation": "Zechariah 14:20 says 'on that day there shall be inscribed on the bells of the horses, Holy to the LORD' — and even ordinary cooking pots will be as holy as the bowls before the altar."}]}, "puzzle": {"type": "match_symbol", "pairs": [{"symbol": "LORD standing on the Mount of Olives", "description": "God's physical arrival on earth, splitting the mountain to rescue his people"}, {"symbol": "Living waters flowing east and west", "description": "Perpetual, life-giving streams from Jerusalem that flow in summer and winter alike"}, {"symbol": "The Feast of Booths for all nations", "description": "The annual pilgrimage festival that every surviving nation must keep in the Messianic age"}, {"symbol": "'Holy to the LORD' on horse bells and cooking pots", "description": "The total consecration of all ordinary life — no division between sacred and secular remains"}, {"symbol": "Plague consuming enemies while they stand", "description": "Divine judgment on armies gathered against Jerusalem — absolute and inescapable"}, {"symbol": "The LORD will be one and his name one", "description": "The final, universal declaration that there is only one God and one true name for all peoples" const CHAPTER_ICONS = ["🐎", "🔥", "👑", "🕯️", "📜", "🐴", "💛", "🎉", "🫏", "🐑", "💰", "💧", "⛲", "🏔️"];

// ========== STATE ==========
const state = {
  currentScreen: 'welcome',
  currentChapter: null,
  currentTab: 'devotional',
  // Per-chapter progress
  progress: {},
  // Quiz state per chapter
  quizState: {},
  // Puzzle state per chapter
  puzzleState: {},
};

// ========== PERSISTENCE ==========
const STORAGE_KEY = 'zechariah_progress_v1';

function saveProgress() {
  try {
    const data = { progress: state.progress, quizState: state.quizState, puzzleState: state.puzzleState };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* storage unavailable */ }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.progress) state.progress = data.progress;
      if (data.quizState) state.quizState = data.quizState;
      if (data.puzzleState) state.puzzleState = data.puzzleState;
    }
  } catch (e) { /* storage unavailable */ }
}

// Initialize progress for all chapters (defaults)
CHAPTERS.forEach(ch => {
  state.progress[ch.chapter] = { devotional: false, quiz: false, puzzle: false };
});

// Load saved progress (overrides defaults)
loadProgress();

// ========== THEME ==========
function initTheme() {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (prefersDark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeIcon').innerHTML = '&#9728;';
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    document.getElementById('themeIcon').innerHTML = '&#9790;';
  } else {
    html.setAttribute('data-theme', 'dark');
    document.getElementById('themeIcon').innerHTML = '&#9728;';
  }
}

// ========== NAVIGATION ==========
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  state.currentScreen = screenId;
  
  const backBtn = document.getElementById('backBtn');
  if (screenId === 'welcomeScreen') {
    backBtn.classList.remove('visible');
  } else if (screenId === 'chapterSelectScreen') {
    backBtn.classList.add('visible');
  } else {
    backBtn.classList.add('visible');
  }
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (state.currentScreen === 'chapterSessionScreen') {
    showChapterSelect();
  } else if (state.currentScreen === 'chapterSelectScreen') {
    showWelcome();
  }
}

function showWelcome() {
  updateWelcomeProgress();
  showScreen('welcomeScreen');
}

function showChapterSelect() {
  renderChapterGrid();
  showScreen('chapterSelectScreen');
}

function showChapterSession(chapterNum) {
  state.currentChapter = chapterNum;
  state.currentTab = 'devotional';
  renderSession();
  showScreen('chapterSessionScreen');
}

// ========== WELCOME PROGRESS ==========
function getCompletedCount() {
  let count = 0;
  CHAPTERS.forEach(ch => {
    const p = state.progress[ch.chapter];
    if (p.devotional && p.quiz && p.puzzle) count++;
  });
  return count;
}

function updateWelcomeProgress() {
  const completed = getCompletedCount();
  document.getElementById('welcomeProgressLabel').textContent = completed + ' of 14 chapters complete';
  document.getElementById('welcomeProgressBar').style.width = ((completed / 14) * 100) + '%';
}

// ========== CHAPTER GRID ==========
function getChapterStatus(chapterNum) {
  const p = state.progress[chapterNum];
  if (p.devotional && p.quiz && p.puzzle) return 'completed';
  if (p.devotional || p.quiz || p.puzzle) return 'in-progress';
  return 'not-started';
}

function getModesCompleted(chapterNum) {
  const p = state.progress[chapterNum];
  let c = 0;
  if (p.devotional) c++;
  if (p.quiz) c++;
  if (p.puzzle) c++;
  return c;
}

function renderChapterGrid() {
  const grid = document.getElementById('chaptersGrid');
  grid.innerHTML = '';
  
  CHAPTERS.forEach((ch, idx) => {
    const status = getChapterStatus(ch.chapter);
    const modesCount = getModesCompleted(ch.chapter);
    
    const card = document.createElement('div');
    card.className = 'chapter-card' + (status !== 'not-started' ? ' ' + status.replace('-', '') : '');
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', 'Chapter ' + ch.chapter + ': ' + ch.title + ', ' + status.replace('-', ' '));
    card.onclick = () => showChapterSession(ch.chapter);
    card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showChapterSession(ch.chapter); } };
    
    let statusHTML = '';
    if (status === 'completed') {
      statusHTML = '<div class="completion-check" aria-label="Completed">&#10003;</div>';
    } else if (status === 'in-progress') {
      statusHTML = '<div class="chapter-status"><div class="status-dot in-progress"></div><span class="status-text">' + modesCount + '/3</span></div>';
    } else {
      statusHTML = '<div class="chapter-status"><div class="status-dot"></div></div>';
    }
    
    card.innerHTML = `
      <div class="chapter-icon">${CHAPTER_ICONS[idx]}</div>
      <div class="chapter-info">
        <div class="chapter-number">Chapter ${ch.chapter}</div>
        <div class="chapter-name">${ch.title}</div>
      </div>
      ${statusHTML}
    `;
    
    grid.appendChild(card);
  });
}

// ========== SESSION RENDERING ==========
function getChapterData() {
  return CHAPTERS.find(ch => ch.chapter === state.currentChapter);
}

function renderSession() {
  const ch = getChapterData();
  if (!ch) return;
  
  document.getElementById('sessionChapterNum').textContent = 'Chapter ' + ch.chapter;
  document.getElementById('sessionTitle').textContent = ch.title;
  
  updateSessionProgress();
  
  // Reset tabs to devotional
  switchTab('devotional');
  
  renderDevotional(ch);
  renderQuiz(ch);
  renderPuzzle(ch);
}

function updateSessionProgress() {
  const p = state.progress[state.currentChapter];
  const dots = document.querySelectorAll('#sessionProgress .session-progress-dot');
  const modes = ['devotional', 'quiz', 'puzzle'];
  dots.forEach((dot, i) => {
    dot.className = 'session-progress-dot';
    if (p[modes[i]]) dot.classList.add('done');
    if (modes[i] === state.currentTab) dot.classList.add('active');
  });
}

function switchTab(tabName) {
  state.currentTab = tabName;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const isActive = btn.dataset.tab === tabName;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', isActive);
  });
  
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.getElementById(tabName + 'Tab').classList.add('active');
  
  updateSessionProgress();
}

// ========== DEVOTIONAL ==========
function renderDevotional(ch) {
  const tab = document.getElementById('devotionalTab');
  const isDone = state.progress[ch.chapter].devotional;
  
  let promptsHTML = ch.devotional.reflection_prompts.map((p, i) => `
    <div class="reflection-card" id="refl-${ch.chapter}-${i}">
      <button class="reflection-toggle" onclick="toggleReflection(${ch.chapter}, ${i})" aria-expanded="false">
        <span>${p}</span>
        <span class="reflection-arrow">&#9660;</span>
      </button>
      <div class="reflection-body">
        <textarea class="reflection-space" placeholder="Write your thoughts here..." aria-label="Your reflection"></textarea>
      </div>
    </div>
  `).join('');
  
  tab.innerHTML = `
    <div class="devotional-summary">${ch.devotional.summary}</div>
    <div class="verse-card">
      <div class="verse-text">"${ch.devotional.featured_verse.text}"</div>
      <div class="verse-ref">&mdash; ${ch.devotional.featured_verse.reference}</div>
    </div>
    <div class="reflection-section">
      <h3>Reflect</h3>
      ${promptsHTML}
    </div>
    <div class="devotional-done-section">
      <button class="devotional-done-btn${isDone ? ' completed' : ''}" id="devotionalDoneBtn" onclick="markDevotionalDone()" tabindex="0">
